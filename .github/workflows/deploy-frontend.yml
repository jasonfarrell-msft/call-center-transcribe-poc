name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-frontend.yml
      - CallCenterTranscription.sln
      - Directory.Build.props
      - Directory.Build.targets
      - NuGet.config
      - global.json
      - src/CallCenterTranscription.Shared/**
      - src/CallCenterTranscription.Web/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'deploy-frontend-production' || format('deploy-frontend-skip-{0}', github.run_id) }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 9.0.x
  WEB_PROJECT_PATH: src/CallCenterTranscription.Web/CallCenterTranscription.Web.csproj
  PUBLISH_PATH: ${{ github.workspace }}/published/web

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore web project
        run: dotnet restore ${{ env.WEB_PROJECT_PATH }}

      - name: Publish web project
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-restore --output "${{ env.PUBLISH_PATH }}"

      - name: Upload published frontend
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: frontend-web
          path: ${{ env.PUBLISH_PATH }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download published frontend
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          name: frontend-web
          path: ${{ env.PUBLISH_PATH }}

      - name: Azure login
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify deployment target
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: az webapp show --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --query "defaultHostName" -o tsv

      - name: Deploy frontend to App Service
        uses: azure/webapps-deploy@b686016b4de8820a23519503685d8d03fbfa03a6 # azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}

      - name: Azure logout
        if: always()
        run: az logout
