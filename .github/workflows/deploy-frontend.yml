name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-frontend.yml
      - CallCenterTranscription.sln
      - Directory.Build.props
      - Directory.Build.targets
      - NuGet.config
      - global.json
      - src/CallCenterTranscription.Shared/**
      - src/CallCenterTranscription.Web/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'deploy-frontend-production' || format('deploy-frontend-skip-{0}', github.run_id) }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 9.0.x
  WEB_PROJECT_PATH: src/CallCenterTranscription.Web/CallCenterTranscription.Web.csproj
  PUBLISH_PATH: ${{ github.workspace }}/published/web

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore web project
        run: dotnet restore ${{ env.WEB_PROJECT_PATH }}

      - name: Restore client-side libraries (libman)
        working-directory: src/CallCenterTranscription.Web
        run: |
          dotnet tool restore --verbosity minimal
          dotnet tool run libman restore

      - name: Publish web project
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-restore --output "${{ env.PUBLISH_PATH }}"

      - name: Upload published frontend
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: frontend-web
          path: ${{ env.PUBLISH_PATH }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download published frontend
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8
        with:
          name: frontend-web
          path: ${{ env.PUBLISH_PATH }}

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify deployment target
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: az webapp show --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --query "defaultHostName" -o tsv

      - name: Deploy frontend to App Service
        uses: azure/webapps-deploy@b686016b4de8820a23519503685d8d03fbfa03a6 # azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}

      - name: Azure logout
        if: always()
        run: az logout
